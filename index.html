<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="My World 🌸"/>
<title>My World 🌸</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Georgia',serif;background:#fff5f9;color:#5c2840;min-height:100vh;overflow-x:hidden;}
  input,textarea,button{font-family:'Georgia',serif;}
  input:focus,textarea:focus{outline:none;}
  input::placeholder,textarea::placeholder{color:#d4a0bc;}
  button{cursor:pointer;}

  #lockScreen{
    min-height:100vh;
    background:linear-gradient(160deg,#ffe4f0 0%,#ffd6e8 40%,#ffc8e0 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    position:fixed;inset:0;z-index:9999;overflow:hidden;
  }
  .petal{position:fixed;top:-20px;pointer-events:none;animation:fall linear infinite;}
  @keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(360deg);opacity:0.3;}}
  @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
  @keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);}}
  @keyframes popIn{0%{transform:scale(0.95);opacity:0;}100%{transform:scale(1);opacity:1;}}
  @keyframes slideUp{0%{transform:translateY(100%);opacity:0;}100%{transform:translateY(0);opacity:1;}}
  @keyframes flyingBunny{0%{transform:translateX(-100vw) translateY(0) rotate(-15deg);opacity:0;}10%{opacity:1;}50%{transform:translateX(0vw) translateY(-20px) rotate(0deg);}90%{opacity:1;}100%{transform:translateX(100vw) translateY(-40px) rotate(15deg);opacity:0;}}

  .lock-card{
    background:rgba(255,255,255,0.88);backdrop-filter:blur(12px);
    border-radius:28px;padding:40px 36px;text-align:center;
    box-shadow:0 8px 40px rgba(230,120,160,0.25);
    border:1.5px solid rgba(255,180,210,0.6);
    z-index:1;width:300px;animation:float 3s ease-in-out infinite;
  }
  .lock-card.shake{animation:shake 0.5s ease;}
  #pwInput{
    width:100%;padding:12px 16px;
    background:#fff0f6;border:1.5px solid #f0b8d0;
    border-radius:50px;font-size:14px;color:#8b4a6a;
    text-align:center;margin-bottom:14px;
  }
  .lock-btn{
    width:100%;padding:12px;
    background:linear-gradient(135deg,#f0799a,#e05585);
    color:#fff;border:none;border-radius:50px;
    font-size:14px;font-weight:bold;letter-spacing:0.5px;
    box-shadow:0 4px 16px rgba(224,85,133,0.35);
  }

  #app{display:none;padding-bottom:72px;}
  .header{
    background:linear-gradient(135deg,#ffe0ee 0%,#ffd0e8 100%);
    padding:20px 18px 16px;
    border-bottom:1.5px solid #f9c8dc;
    position:relative;overflow:hidden;
  }
